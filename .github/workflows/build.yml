name: Build and Push Docker Image
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      # Free disk space — base image is ~15GB, runner only has ~14GB free by default
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker image prune -af
          df -h /
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # buildx setup — required for the secret mount used in Dockerfile
      # (RUN --mount=type=secret,id=civitai_token). Without this the
      # build runs with the legacy builder which silently ignores the
      # mount and the install script then fails because the token file
      # doesn't exist.
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          # Civitai requires an auth Bearer token to download
          # DR34ML4Y. The secret is read inside the install-pose-loras
          # RUN step via --mount=type=secret,id=civitai_token, which
          # writes it to /run/secrets/civitai_token for the duration
          # of that RUN only — never persisted into image layers.
          secrets: |
            civitai_token=${{ secrets.CIVITAI_TOKEN }}
